    <style>
      /* iOS System Font Stack */
      body {
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background-color: #F2F2F7; /* iOS System Gray 6 */
        color: #1C1C1E; /* iOS System Label */
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      /* While dragging a card, suppress text selection board-wide — otherwise the
         pointer sweeping over labels leaves flickering blue selection behind it. */
      body.sosa-dragging,
      body.sosa-dragging * {
        user-select: none !important;
        -webkit-user-select: none !important;
        cursor: grabbing !important;
      }

      /* Respect the OS "reduce motion" setting: keep the app fully usable, just
         still. Anything that only conveys polish is collapsed to an instant. */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }

      /* Hide scrollbar */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* iOS-style Glass Material */
      .ios-glass {
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(20px) saturate(180%);
        -webkit-backdrop-filter: blur(20px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.3);
      }

      /* Native Inputs */
      input:focus, textarea:focus {
        outline: none;
      }
    </style>
